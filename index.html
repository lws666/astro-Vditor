<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Astro Publisher Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor@3.9.6/dist/index.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --vditor-color: #3b82f6; }
        .vditor { border-radius: 12px; border: 1px solid #e5e7eb !important; overflow: hidden; }
        #lock-screen {
            position: fixed; inset: 0; z-index: 100;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(20px); transition: all 0.5s ease;
        }
        .hidden-content { display: none; }
        .config-input { width: 100%; background-color: #f8fafc; padding: 10px; border-radius: 8px; outline: none; border: 1px solid #e2e8f0; font-size: 13px; transition: all 0.2s; }
        .config-input:focus { border-color: #3b82f6; background-color: #fff; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .btn-primary { background: #2563eb; color: white; padding: 10px 20px; border-radius: 10px; font-weight: bold; transition: all 0.2s; }
        .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }
        .btn-primary:active { transform: translateY(0); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div id="lock-screen">
        <div class="bg-white/10 p-8 rounded-3xl border border-white/20 shadow-2xl text-center space-y-6 w-80 backdrop-blur-md">
            <div class="text-6xl">📝</div>
            <h2 class="text-white text-xl font-bold">文章发布系统</h2>
            <input type="password" id="access-password" placeholder="输入访问密钥..." 
                class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-white text-center">
            <button onclick="verifyPassword()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-bold">解除锁定</button>
        </div>
    </div>

    <div id="main-content" class="hidden-content p-4 md:p-8">
        <div class="max-w-7xl mx-auto space-y-6">
            <header class="flex justify-between items-center bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h1 class="text-2xl font-black text-slate-800 tracking-tight underline decoration-blue-500 decoration-4">Astro Publisher</h1>
                <div class="flex gap-3">
                    <button onclick="logout()" class="text-slate-400 hover:text-slate-600 text-sm font-bold">登出</button>
                    <button onclick="publishToGithub()" id="publish-btn" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2.5 rounded-xl font-bold transition-all shadow-lg flex items-center gap-2">
                        🚀 发布到 GitHub
                    </button>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <div class="lg:col-span-1 space-y-6">
                    
                    <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                        <h3 class="font-bold text-slate-700 text-sm flex items-center gap-2">🔗 目标仓库配置</h3>
                        <div class="space-y-3">
                            <div><label class="text-[10px] font-black text-slate-400 uppercase">Username</label><input type="text" id="gh-user" class="config-input"></div>
                            <div><label class="text-[10px] font-black text-slate-400 uppercase">Repo</label><input type="text" id="gh-repo" placeholder="my-astro-blog" class="config-input"></div>
                            <div><label class="text-[10px] font-black text-slate-400 uppercase">Content Path</label><input type="text" id="gh-path" placeholder="src/content/blog" class="config-input"></div>
                            <div><label class="text-[10px] font-black text-slate-400 uppercase">Token</label><input type="password" id="gh-token" class="config-input"></div>
                        </div>
                    </section>

                    <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                        <h3 class="font-bold text-slate-700 text-sm">📄 Frontmatter</h3>
                        <div class="space-y-3">
                            <div><label class="text-[10px] font-black text-slate-400 uppercase">Title (标题)</label><input type="text" id="fm-title" placeholder="Hello World" class="config-input"></div>
                            <div><label class="text-[10px] font-black text-slate-400 uppercase">Slug (文件名)</label><input type="text" id="fm-slug" placeholder="hello-world" class="config-input"></div>
                            <div><label class="text-[10px] font-black text-slate-400 uppercase">Category</label><input type="text" id="fm-category" class="config-input"></div>
                            <div><label class="text-[10px] font-black text-slate-400 uppercase">Hero Image</label><input type="text" id="fm-image" placeholder="https://..." class="config-input"></div>
                        </div>
                    </section>
                </div>

                <div class="lg:col-span-3">
                    <div id="vditor" class="shadow-sm"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vditor@3.9.6/dist/index.min.js"></script>
    <script>
        const CONFIG = { PASSWORD: "__CF_PAGES_PASSWORD__" };
        let vditor;

        // --- 核心功能：直接推送文章到 GitHub ---
        async function publishToGithub() {
            const btn = document.getElementById('publish-btn');
            const user = document.getElementById('gh-user').value;
            const repo = document.getElementById('gh-repo').value;
            const path = document.getElementById('gh-path').value.replace(/\/$/, "");
            const token = document.getElementById('gh-token').value;
            
            const title = document.getElementById('fm-title').value;
            const slug = document.getElementById('fm-slug').value || title.toLowerCase().replace(/\s+/g, '-');
            const category = document.getElementById('fm-category').value || 'Uncategorized';
            const image = document.getElementById('fm-image').value;

            if (!user || !repo || !token || !title) {
                alert("请完整填写 GitHub 配置及文章标题！");
                return;
            }

            btn.innerText = "⏳ 正在同步...";
            btn.disabled = true;

            // 组合内容
            const frontmatter = `---
title: "${title}"
pubDate: ${new Date().toISOString().split('T')[0]}
description: "${title}"
author: "Admin"
image: "${image}"
category: "${category}"
---`;
            const fullContent = `${frontmatter}\n\n${vditor.getValue()}`;
            const base64Content = btoa(unescape(encodeURIComponent(fullContent)));
            
            const filePath = `${path}/${slug}.md`;
            const apiUrl = `https://api.github.com/repos/${user}/${repo}/contents/${filePath}`;

            try {
                // 1. 尝试获取现有文件的 SHA（如果是更新文章的话）
                let sha = "";
                const checkRes = await fetch(apiUrl, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (checkRes.ok) {
                    const fileData = await checkRes.json();
                    sha = fileData.sha;
                }

                // 2. 写入/更新文件
                const res = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Publish post: ${title}`,
                        content: base64Content,
                        sha: sha || undefined
                    })
                });

                if (res.ok) {
                    alert("🎉 文章已成功推送到 GitHub！");
                } else {
                    const err = await res.json();
                    throw new Error(err.message);
                }
            } catch (e) {
                alert("发布失败: " + e.message);
            } finally {
                btn.innerText = "🚀 发布到 GitHub";
                btn.disabled = false;
            }
        }

        // --- 初始化与认证逻辑 ---
        function initVditor() {
            vditor = new Vditor('vditor', {
                height: 750,
                mode: 'ir',
                theme: 'classic',
                cache: { enable: true },
                toolbar: ['headings', 'bold', 'italic', 'link', 'list', 'check', 'quote', 'line', 'code', 'table', 'undo', 'redo', 'preview', 'fullscreen']
            });
        }

        function verifyPassword() {
            const input = document.getElementById('access-password').value;
            const secret = CONFIG.PASSWORD.includes("__CF_PAGES") ? "1234" : CONFIG.PASSWORD;
            if (input === secret) {
                localStorage.setItem('publisher_token', btoa(secret));
                unlock();
            } else {
                alert("密钥错误");
            }
        }

        function unlock() {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('main-content').classList.remove('hidden-content');
            initVditor();
            // 自动加载本地缓存配置
            ['gh-user', 'gh-repo', 'gh-path'].forEach(id => {
                document.getElementById(id).value = localStorage.getItem(id) || "";
            });
        }

        window.onbeforeunload = () => {
            ['gh-user', 'gh-repo', 'gh-path'].forEach(id => {
                localStorage.setItem(id, document.getElementById(id).value);
            });
        };

        function logout() { localStorage.removeItem('publisher_token'); location.reload(); }

        document.getElementById('access-password').addEventListener('keypress', e => e.key === 'Enter' && verifyPassword());
        window.onload = () => { if(localStorage.getItem('publisher_token')) unlock(); };
    </script>
</body>
</html>
