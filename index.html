<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Mizuki Admin Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor@3.9.6/dist/index.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --vditor-color: #3b82f6; --glass-opacity: 0.08; --bg-brightness: 1; }
        .dark-mode { --glass-opacity: 0.2; --bg-brightness: 0.3; }
        body {
            background-image: url('https://img.lwsnb.dpdns.org/file/1778339868119_1.png');
            background-attachment: fixed; background-size: cover; background-position: center;
            min-height: 100vh; font-family: sans-serif; color: white; margin: 0; transition: 0.3s;
        }
        body::before { content: ""; position: fixed; inset: 0; background: rgba(0,0,0, calc(1 - var(--bg-brightness))); z-index: -1; pointer-events: none; }
        .glass-card { background: rgba(255, 255, 255, var(--glass-opacity)); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 16px; }
        .vditor { border: none !important; background: rgba(0, 0, 0, 0.2) !important; border-radius: 12px !important; }
        .config-input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 12px; border-radius: 10px; color: white; outline: none; font-size: 13px; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        #lock-screen { position: fixed; inset: 0; z-index: 9999; background: #0f172a; display: flex; align-items: center; justify-content: center; }
        #lock-screen.hidden-lock { opacity: 0; visibility: hidden; pointer-events: none; transition: 0.6s; }
        @media (min-width: 1025px) { .pc-layout { display: grid; grid-template-columns: 240px 1fr; height: 100vh; } }
    </style>
</head>
<body id="body-root">

    <div id="lock-screen">
        <div class="glass-card p-10 text-center space-y-6 w-[85%] max-w-sm">
            <h2 class="text-2xl font-bold">Mizuki Admin</h2>
            <input type="password" id="access-password" placeholder="请输入管理密钥" class="config-input text-center">
            <button id="unlock-btn" class="w-full bg-blue-600 py-3 rounded-xl font-bold hover:bg-blue-500 transition-all">解锁进入</button>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <div class="pc-layout">
            <aside class="p-6 border-r border-white/10 bg-black/10 flex flex-col justify-between pc-only">
                <div>
                    <div class="font-bold text-lg mb-8 text-blue-400">MIZUKI CMS</div>
                    <nav class="space-y-2">
                        <div onclick="openListModal()" class="cursor-pointer p-3 hover:bg-white/10 rounded-lg transition-all">📁 文章管理</div>
                        <div onclick="toggleDarkMode()" class="cursor-pointer p-3 hover:bg-white/10 rounded-lg transition-all">🌓 切换模式</div>
                        <div onclick="logout()" class="cursor-pointer p-3 hover:bg-white/10 rounded-lg text-red-400 transition-all">🚪 退出登录</div>
                    </nav>
                </div>
            </aside>

            <div class="overflow-y-auto p-4 lg:p-8">
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 max-w-[1600px] mx-auto">
                    <div class="lg:col-span-3">
                        <section class="glass-card p-5 space-y-4">
                            <h3 class="text-xs font-bold text-blue-400 uppercase border-b border-white/10 pb-2">GitHub Sync</h3>
                            <div class="space-y-3 text-[10px]">
                                <div>USER<input type="text" id="gh-user" class="config-input mt-1"></div>
                                <div>REPO<input type="text" id="gh-repo" class="config-input mt-1"></div>
                                <div>PATH<input type="text" id="gh-path" class="config-input mt-1"></div>
                                <div>TOKEN<input type="password" id="gh-token" class="config-input mt-1"></div>
                            </div>
                        </section>
                    </div>

                    <div class="lg:col-span-3">
                        <section class="glass-card p-5 space-y-4">
                            <h3 class="text-xs font-bold text-blue-400 uppercase border-b border-white/10 pb-2">Frontmatter</h3>
                            <div class="space-y-3 text-[10px]">
                                <div>TITLE<input type="text" id="fm-title" class="config-input mt-1"></div>
                                <div>PUBLISHED (DATE)<input type="date" id="fm-published" class="config-input mt-1"></div>
                                <div>CATEGORY<input type="text" id="fm-category" class="config-input mt-1"></div>
                                <div>IMAGE<input type="text" id="fm-image" class="config-input mt-1"></div>
                                <div>TAGS<input type="text" id="fm-tags" class="config-input mt-1"></div>
                                <div>DESCRIPTION<textarea id="fm-description" class="config-input mt-1 h-16"></textarea></div>
                            </div>
                        </section>
                    </div>

                    <div class="lg:col-span-6 space-y-4">
                        <div class="glass-card p-2 min-h-[600px] flex flex-col">
                            <div class="flex gap-2 p-2 border-b border-white/5 mb-2">
                                <button onclick="insertVideoTag()" class="bg-blue-600/30 hover:bg-blue-600 px-3 py-1 rounded text-[10px] font-bold transition-all">📺 插入视频标签</button>
                                <span id="save-status" class="ml-auto text-[10px] opacity-30 self-center">就绪</span>
                            </div>
                            <div id="vditor" class="flex-grow"></div>
                        </div>
                        <button onclick="publishToGithub()" id="publish-btn" class="w-full bg-blue-600 py-3 rounded-xl font-bold shadow-lg active:scale-95 transition-all">确认并上传到 GITHUB</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="list-modal" class="fixed inset-0 z-[10000] bg-black/70 backdrop-blur-md hidden flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-2xl max-h-[80vh] flex flex-col overflow-hidden">
            <div class="p-4 border-b border-white/10 flex justify-between items-center"><h3 class="font-bold">文章列表</h3><button onclick="closeListModal()" class="text-2xl">&times;</button></div>
            <div id="article-list-container" class="overflow-y-auto p-4 space-y-2"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vditor@3.9.6/dist/index.min.js"></script>
    <script>
    (function() {
        // ================= 配置变量 =================
        const ADMIN_PASSWORD = "1234"; // 在这里修改你的进入密码
        // ===========================================

        let vditor, currentSha = null, currentFileName = null;
        const $ = (id) => document.getElementById(id);

        window.toggleDarkMode = () => {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('mizuki_dark', isDark);
        };
        if(localStorage.getItem('mizuki_dark') === 'true') document.body.classList.add('dark-mode');

        window.insertVideoTag = () => {
            const url = prompt("视频 URL:"); if(!url) return;
            const poster = prompt("封面 URL:", "https://img.lwsnb.dpdns.org/file/1770349301804_DefualtThumbnail.jpg.webp");
            const tag = `\n<video width="640" height="360" controls="" poster="${poster}">\n  <source src="${url}" type="video/mp4"/>\n  你的浏览器不支持 HTML5 视频。\n</video>\n`;
            vditor.insertValue(tag);
        };

        window.publishToGithub = async () => {
            const user = $("gh-user").value, repo = $("gh-repo").value, path = $("gh-path").value, token = $("gh-token").value;
            const title = $("fm-title").value, published = $("fm-published").value;
            if(!token || !title || !published) return alert("配置项缺失");

            const btn = $("publish-btn");
            btn.disabled = true; btn.textContent = "正在发布...";

            const fileName = currentFileName || `${published}-${title.replace(/\s+/g, '-')}.md`;
            const yaml = `---
title: "${title}"
published: ${published}
category: "${$("fm-category").value}"
image: "${$("fm-image").value}"
tags: [${$("fm-tags").value}]
description: "${$("fm-description").value}"
---

`;
            const fullText = yaml + vditor.getValue();
            const encoded = btoa(unescape(encodeURIComponent(fullText)));

            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}/${fileName}`, {
                    method: "PUT",
                    headers: { Authorization: `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: `Update via Mizuki Admin`,
                        content: encoded,
                        sha: currentSha || undefined
                    })
                });
                if(res.ok) {
                    alert("✅ 发布成功");
                    localStorage.removeItem("pub_draft");
                    location.reload();
                } else {
                    const err = await res.json();
                    alert("❌ 失败: " + err.message);
                }
            } catch (e) { alert("❌ 网络异常"); }
            btn.disabled = false; btn.textContent = "确认并上传到 GITHUB";
        };

        async function openListModal() {
            const user = $("gh-user").value, repo = $("gh-repo").value, path = $("gh-path").value, token = $("gh-token").value;
            if(!token) return alert("请配置 Token");
            $("list-modal").classList.remove("hidden");
            $("article-list-container").innerHTML = "正在拉取...";
            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, { headers: { Authorization: `token ${token}` } });
                const files = await res.json();
                $("article-list-container").innerHTML = files.filter(f => f.name.endsWith('.md')).map(f => `
                    <div class="flex items-center justify-between p-3 bg-white/5 rounded-lg border border-white/5 hover:bg-white/10 group transition-all text-xs">
                        <span class="cursor-pointer flex-grow text-left" onclick="loadArticle('${f.name}', '${f.path}')">${f.name}</span>
                        <button onclick="if(confirm('删除文章？')) deleteArticle('${f.path}', '${f.sha}')" class="text-red-400 opacity-0 group-hover:opacity-100 px-2 transition-all">删除</button>
                    </div>
                `).join('');
            } catch (e) { $("article-list-container").innerHTML = "加载列表失败"; }
        }

        async function loadArticle(name, path) {
            const user = $("gh-user").value, repo = $("gh-repo").value, token = $("gh-token").value;
            try {
                const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, { headers: { Authorization: `token ${token}` } });
                const data = await res.json();
                const content = decodeURIComponent(escape(atob(data.content)));
                currentSha = data.sha;
                currentFileName = name;
                
                const fmMatch = content.match(/^---([\s\S]*?)---([\s\S]*)$/);
                if (fmMatch) {
                    const yaml = fmMatch[1], body = fmMatch[2].trim();
                    $("fm-title").value = (yaml.match(/title:\s*"(.*?)"/) || yaml.match(/title:\s*(.*)/) || [])[1] || "";
                    $("fm-published").value = (yaml.match(/published:\s*(\d{4}-\d{2}-\d{2})/) || [])[1] || "";
                    $("fm-category").value = (yaml.match(/category:\s*"(.*?)"/) || yaml.match(/category:\s*(.*)/) || [])[1] || "";
                    $("fm-image").value = (yaml.match(/image:\s*(.*)/) || [])[1] || "";
                    $("fm-tags").value = (yaml.match(/tags:\s*\[(.*?)\]/) || yaml.match(/tags:\s*(.*)/) || [])[1] || "";
                    $("fm-description").value = (yaml.match(/description:\s*"(.*?)"/) || yaml.match(/description:\s*(.*)/) || [])[1] || "";
                    vditor.setValue(body);
                }
                closeListModal();
            } catch (e) { alert("文章解析失败"); }
        }

        window.deleteArticle = async (path, sha) => {
            const user = $("gh-user").value, repo = $("gh-repo").value, token = $("gh-token").value;
            const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${path}`, {
                method: "DELETE", headers: { Authorization: `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: "Delete via CMS", sha: sha })
            });
            if(res.ok) { alert("已删除"); openListModal(); }
        };

        function init() {
            ["gh-user", "gh-repo", "gh-path", "gh-token"].forEach(k => {
                $(k).value = localStorage.getItem('cfg_'+k) || "";
                $(k).onchange = (e) => localStorage.setItem('cfg_'+k, e.target.value);
            });
            vditor = new Vditor("vditor", {
                height: 600, mode: "ir", theme: "dark",
                after: () => {
                    const d = localStorage.getItem("pub_draft");
                    if(d) vditor.setValue(d);
                },
                input: (v) => {
                    localStorage.setItem("pub_draft", v);
                    $("save-status").textContent = "草稿已存 " + new Date().toLocaleTimeString();
                }
            });
        }

        window.unlock = () => {
            if($("access-password").value === ADMIN_PASSWORD) {
                localStorage.setItem("pub_auth", "1");
                $("lock-screen").classList.add("hidden-lock");
                $("main-content").classList.remove("hidden");
                init();
            } else { alert("密钥验证失败"); }
        };
        window.logout = () => { localStorage.removeItem("pub_auth"); location.reload(); };
        window.openListModal = openListModal;
        window.loadArticle = loadArticle;
        window.closeListModal = () => $("list-modal").classList.add("hidden");

        $("unlock-btn").onclick = window.unlock;
        if(localStorage.getItem("pub_auth") === "1") {
            $("lock-screen").classList.add("hidden-lock");
            $("main-content").classList.remove("hidden");
            init();
        }
    })();
    </script>
</body>
</html>
