<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Astro Editor (Pro Mode)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor@3.9.6/dist/index.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --vditor-color: #3b82f6; }
        .vditor { border-radius: 12px; border: 1px solid #e5e7eb !important; overflow: hidden; }
        .vditor-toolbar { border-bottom: 1px solid #e5e7eb !important; background-color: #f9fafb !important; }
        
        #lock-screen {
            position: fixed; inset: 0; z-index: 100;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(20px); transition: all 0.5s ease;
        }
        .hidden-content { display: none; }
        .emoji-btn { cursor: pointer; transition: transform 0.2s; font-size: 1.4rem; filter: grayscale(0.3); }
        .emoji-btn:hover { transform: scale(1.3); filter: grayscale(0); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div id="lock-screen">
        <div class="bg-white/10 p-8 rounded-3xl border border-white/20 shadow-2xl text-center space-y-6 w-80 backdrop-blur-md">
            <div class="text-6xl animate-bounce">🔒</div>
            <div class="space-y-2">
                <h2 class="text-white text-xl font-bold tracking-wide">私有编辑器</h2>
                <p class="text-slate-400 text-xs">Environment variable secured</p>
            </div>
            <input type="password" id="access-password" placeholder="输入访问密钥..." 
                class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-white text-center transition-all">
            <button onclick="verifyPassword()" 
                class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-bold transition-all shadow-lg shadow-blue-500/20">
                解除锁定
            </button>
            <p id="error-msg" class="text-rose-400 text-xs font-medium hidden">🚫 密钥无效，拒绝访问</p>
        </div>
    </div>

    <div id="main-content" class="hidden-content p-4 md:p-8">
        <div class="max-w-5xl mx-auto space-y-6">
            <header class="flex justify-between items-end border-b border-slate-200 pb-6">
                <div>
                    <h1 class="text-3xl font-black text-slate-800 flex items-center gap-2">Astro Editor ✍️</h1>
                    <p class="text-slate-500 text-sm font-medium">配置已通过 Cloudflare Secrets 注入</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="logout()" class="text-slate-400 hover:text-slate-600 px-3 py-2 text-sm font-bold">登出 🚪</button>
                    <button onclick="exportMarkdown()" class="bg-slate-900 hover:bg-black text-white px-6 py-2.5 rounded-xl font-bold transition-all shadow-xl flex items-center gap-2">
                        💾 导出文章
                    </button>
                </div>
            </header>

            <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Title</label>
                    <input type="text" id="fm-title" placeholder="文章标题" class="w-full bg-slate-50 p-2 rounded-lg outline-none focus:ring-1 focus:ring-blue-500">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Category</label>
                    <input type="text" id="fm-category" placeholder="分类" class="w-full bg-slate-50 p-2 rounded-lg outline-none focus:ring-1 focus:ring-blue-500">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-slate-400 uppercase">Date</label>
                    <input type="date" id="fm-date" class="w-full bg-slate-50 p-2 rounded-lg outline-none focus:ring-1 focus:ring-blue-500">
                </div>
            </section>

            <div class="flex items-center gap-4 bg-white p-3 rounded-xl border border-slate-200 w-fit">
                <span class="text-[10px] font-bold text-slate-400 border-r pr-3">QUICK EMOJI</span>
                <div class="flex gap-4">
                    <span class="emoji-btn" onclick="insertEmoji('🚀')">🚀</span>
                    <span class="emoji-btn" onclick="insertEmoji('💡')">💡</span>
                    <span class="emoji-btn" onclick="insertEmoji('🔥')">🔥</span>
                    <span class="emoji-btn" onclick="insertEmoji('✅')">✅</span>
                    <span class="emoji-btn" onclick="insertEmoji('🛠️')">🛠️</span>
                    <span class="emoji-btn" onclick="insertEmoji('📝')">📝</span>
                </div>
            </div>

            <div id="vditor"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vditor@3.9.6/dist/index.min.js"></script>
    <script>
        // 🛠️ 配置变量
        const CONFIG = {
            // 这个值在本地运行时是占位符，部署到 Cloudflare 时会被构建命令替换
            PASSWORD: "__CF_PAGES_PASSWORD__", 
            VDITOR_HEIGHT: 600
        };

        let vditor;

        // 验证逻辑
        function verifyPassword() {
            const input = document.getElementById('access-password').value;
            // 如果是本地开发环境且没被替换，赋予一个默认调试密码 1234
            const secret = CONFIG.PASSWORD.includes("__CF_PAGES") ? "1234" : CONFIG.PASSWORD;
            
            if (input === secret) {
                localStorage.setItem('auth_token', btoa(secret));
                unlock();
            } else {
                const err = document.getElementById('error-msg');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 2000);
            }
        }

        function checkAuth() {
            const saved = localStorage.getItem('auth_token');
            const secret = CONFIG.PASSWORD.includes("__CF_PAGES") ? "1234" : CONFIG.PASSWORD;
            if (saved === btoa(secret)) unlock();
        }

        function unlock() {
            document.getElementById('lock-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-content').classList.remove('hidden-content');
                initVditor();
            }, 500);
        }

        function logout() {
            localStorage.removeItem('auth_token');
            location.reload();
        }

        function initVditor() {
            vditor = new Vditor('vditor', {
                height: CONFIG.VDITOR_HEIGHT,
                mode: 'ir',
                theme: 'classic',
                cache: { enable: true },
                toolbar: ['headings', 'bold', 'italic', 'link', 'list', 'check', 'quote', 'code', 'table', 'undo', 'redo', 'fullscreen']
            });
            document.getElementById('fm-date').valueAsDate = new Date();
        }

        function insertEmoji(emoji) { vditor.insertValue(emoji); }

        function exportMarkdown() {
            const title = document.getElementById('fm-title').value || 'post';
            const category = document.getElementById('fm-category').value || 'General';
            const date = document.getElementById('fm-date').value;
            const content = vditor.getValue();

            const output = `---\ntitle: "${title}"\ncategory: "${category}"\ndate: ${date}\n---\n\n${content}`;
            const blob = new Blob([output], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${title.replace(/\s+/g, '-')}.md`;
            a.click();
        }

        document.getElementById('access-password').addEventListener('keypress', e => e.key === 'Enter' && verifyPassword());
        window.onload = checkAuth;
    </script>
</body>
</html>
