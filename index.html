<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Astro Publisher Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vditor@3.9.6/dist/index.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --vditor-color: #3b82f6; }
        .vditor { border-radius: 12px; border: 1px solid #e5e7eb !important; overflow: hidden; background: #fff; }
        #lock-screen { position: fixed; inset: 0; z-index: 2000; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); display: flex; align-items: center; justify-content: center; transition: opacity 0.4s ease; }
        #lock-screen.hidden-lock { opacity: 0; visibility: hidden; pointer-events: none; }
        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast { padding: 14px 20px; border-radius: 12px; color: #fff; font-weight: 600; font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,0.18); animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .toast.success { background: #10b981; } .toast.error { background: #ef4444; } .toast.info { background: #3b82f6; }
        @keyframes slideIn { from { transform: translateX(120%); } to { transform: translateX(0); } }
        .config-input { width: 100%; background-color: #f8fafc; padding: 10px 12px; border-radius: 8px; border: 1px solid #e2e8f0; font-size: 13px; transition: all 0.2s; outline: none; }
        .config-input:focus { border-color: #3b82f6; background-color: #fff; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        .tag-pill { display: inline-flex; align-items: center; gap: 4px; background: #eff6ff; color: #2563eb; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        body.dark { background: #0f172a; color: #e2e8f0; }
        body.dark .bg-white { background: #1e293b !important; }
        body.dark .border-slate-200 { border-color: #334155 !important; }
        body.dark .config-input { background-color: #1e293b; border-color: #334155; color: #e2e8f0; }
        body.dark .vditor { background: #1e293b !important; border-color: #334155 !important; }
        .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 transition-colors">

    <div id="lock-screen">
        <div class="bg-white/10 p-8 rounded-3xl border border-white/20 shadow-2xl text-center space-y-6 w-80 backdrop-blur-md">
            <div class="text-6xl animate-bounce">📝</div>
            <h2 class="text-white text-xl font-bold">Astro Publisher Pro</h2>
            <input type="password" id="access-password" placeholder="输入访问密钥" class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-white text-center">
            <button id="unlock-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded-xl font-bold transition-all active:scale-95">🔓 解除锁定</button>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <div id="main-content" class="p-4 md:p-8 hidden">
        <div class="max-w-7xl mx-auto space-y-6">
            
            <header class="flex flex-wrap justify-between items-center gap-4 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex items-center gap-3">
                    <h1 class="text-2xl font-black text-slate-800 tracking-tight">Mizuki Admin</h1>
                    <button onclick="openListModal()" class="ml-4 text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-2">📁 管理文章</button>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleDarkMode()" id="dark-btn" class="p-2">🌙</button>
                    <button onclick="logout()" class="text-slate-400 text-sm hover:text-red-500">登出</button>
                    <button id="publish-btn" onclick="publishToGithub()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-bold transition-all shadow-lg flex items-center gap-2">🚀 发布/更新</button>
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <div class="space-y-6">
                    <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-3">
                        <h3 class="font-bold text-slate-700 text-xs uppercase tracking-widest flex justify-between">GitHub 配置 <button onclick="testConnection()" class="text-blue-500 lowercase">测试</button></h3>
                        <input type="text" id="gh-user" class="config-input" placeholder="GitHub 用户名">
                        <input type="text" id="gh-repo" class="config-input" placeholder="仓库名">
                        <input type="text" id="gh-path" class="config-input" placeholder="路径 (如: src/content/blog)">
                        <input type="password" id="gh-token" class="config-input" placeholder="GitHub Token">
                    </section>

                    <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                        <h3 class="font-bold text-slate-700 text-xs uppercase tracking-widest">文章 Frontmatter</h3>
                        <div class="space-y-3">
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase">Title *</label><input type="text" id="fm-title" class="config-input" placeholder="文章标题"></div>
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase">Slug (文件名)</label><input type="text" id="fm-slug" class="config-input" placeholder="自动生成..."></div>
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase">Published Date *</label><input type="date" id="fm-published" class="config-input"></div>
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase">Category</label><input type="text" id="fm-category" class="config-input" placeholder="Tech"></div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase">Tags (Enter 添加)</label>
                                <div id="tags-container" class="flex flex-wrap gap-1 mb-2"></div>
                                <input type="text" id="fm-tags" class="config-input" placeholder="输入标签...">
                            </div>
                            <div><label class="text-[10px] font-bold text-slate-400 uppercase">Hero Image URL</label><input type="text" id="fm-image" class="config-input" placeholder="/images/cover.jpg"></div>
                        </div>
                    </section>

                    <section class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                        <div class="text-xs text-slate-500 flex justify-between items-center">
                            <span>字符数: <b id="char-count" class="text-slate-800">0</b></span>
                            <span id="draft-indicator" class="hidden text-green-500 text-[10px]">● 已保存本地草稿</span>
                        </div>
                    </section>
                </div>

                <div class="lg:col-span-3">
                    <div id="vditor"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="list-modal" class="fixed inset-0 z-[3000] bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 w-full max-w-2xl rounded-2xl shadow-2xl flex flex-col max-h-[80vh]">
            <div class="p-4 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center">
                <h3 class="font-bold text-slate-800 dark:text-white">现有文章</h3>
                <button onclick="closeListModal()" class="text-2xl text-slate-400">&times;</button>
            </div>
            <div id="article-list-container" class="overflow-y-auto p-4 space-y-2 flex-grow"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vditor@3.9.6/dist/index.min.js"></script>
    <script>
    (function() {
        // 构建时会被 Cloudflare sed 替换
        const ACTUAL_PASSWORD = "[[AUTH_PASSWORD]]";
        const CONFIG_KEYS = ["gh-user", "gh-repo", "gh-path", "gh-token"];
        let vditor, tags = [];

        const $ = (id) => document.getElementById(id);
        const toBase64 = (str) => btoa(unescape(encodeURIComponent(str)));
        const fromBase64 = (str) => decodeURIComponent(escape(atob(str.replace(/\n/g, ''))));

        function showToast(msg, type = "info") {
            const t = document.createElement("div");
            t.className = `toast ${type}`;
            t.innerHTML = `<span>${type === 'success' ? '✅' : 'ℹ️'}</span> ${msg}`;
            $("toast-container").appendChild(t);
            setTimeout(() => { t.style.animation = "slideOut 0.3s forwards"; setTimeout(() => t.remove(), 300); }, 3000);
        }

        async function getGitHubConfig() {
            const cfg = {};
            CONFIG_KEYS.forEach(k => cfg[k.replace('gh-', '')] = $(k).value.trim());
            return cfg;
        }

        async function testConnection() {
            const cfg = await getGitHubConfig();
            try {
                const res = await fetch(`https://api.github.com/repos/${cfg.user}/${cfg.repo}`, {
                    headers: { Authorization: `token ${cfg.token}` }
                });
                if (res.ok) showToast("连接 GitHub 成功！", "success");
                else throw new Error("验证失败，请检查配置");
            } catch (e) { showToast(e.message, "error"); }
        }

        async function openListModal() {
            const cfg = await getGitHubConfig();
            if(!cfg.token) return showToast("请先配置 Token", "error");
            $("list-modal").classList.remove("hidden");
            const container = $("article-list-container");
            container.innerHTML = '<div class="flex justify-center p-8"><div class="spinner !border-blue-500"></div></div>';

            try {
                const res = await fetch(`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${cfg.path}`, {
                    headers: { Authorization: `token ${cfg.token}` }
                });
                const files = await res.json();
                const mdFiles = Array.isArray(files) ? files.filter(f => f.name.endsWith('.md')) : [];
                container.innerHTML = mdFiles.map(f => `
                    <div class="flex items-center justify-between p-3 bg-slate-50 dark:bg-slate-700/50 rounded-xl hover:bg-blue-50 transition-all">
                        <div class="cursor-pointer flex-grow" onclick="loadArticle('${f.path}')">
                            <p class="font-bold text-sm text-slate-700 dark:text-slate-200">${f.name}</p>
                        </div>
                        <button onclick="deleteArticle('${f.path}', '${f.sha}')" class="text-red-400 hover:text-red-600 px-2">🗑️</button>
                    </div>
                `).join('') || '<p class="text-center text-slate-400">暂无文章</p>';
            } catch (e) { container.innerHTML = `<p class="text-red-500 text-center">${e.message}</p>`; }
        }

        async function loadArticle(path) {
            const cfg = await getGitHubConfig();
            showToast("正在下载...");
            closeListModal();
            try {
                const res = await fetch(`https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${path}`, {
                    headers: { Authorization: `token ${cfg.token}` }
                });
                const data = await res.json();
                const raw = fromBase64(data.content);
                const fmMatch = raw.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
                
                if (fmMatch) {
                    const fm = fmMatch[1], content = fmMatch[2];
                    const extract = (k) => {
                        const m = fm.match(new RegExp(`${k}:\\s*["']?(.*?)["']?(\\n|$)`));
                        return m ? m[1].trim() : "";
                    };
                    
                    $("fm-title").value = extract("title");
                    $("fm-slug").value = path.split('/').pop().replace('.md', '');
                    $("fm-published").value = extract("published");
                    $("fm-category").value = extract("category");
                    $("fm-image").value = extract("image");
                    
                    const tMatch = fm.match(/tags:\s*\[(.*?)\]/);
                    tags = tMatch ? tMatch[1].split(',').map(t => t.replace(/["']/g, '').trim()).filter(t => t) : [];
                    renderTags();
                    vditor.setValue(content.trim());
                } else {
                    vditor.setValue(raw);
                }
                showToast("载入成功", "success");
            } catch (e) { showToast("载入失败: " + e.message, "error"); }
        }

        async function publishToGithub() {
            const cfg = await getGitHubConfig();
            const title = $("fm-title").value.trim();
            const published = $("fm-published").value;

            if(!title || !cfg.token || !published) {
                return showToast("请填写标题、Token 和发布日期", "error");
            }
            
            const btn = $("publish-btn");
            btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 正在上传...';

            const slug = $("fm-slug").value || title.toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]/g, '');
            const today = new Date().toISOString().split('T')[0];
            const tagStr = tags.length ? `\ntags: [${tags.map(t => `"${t}"`).join(', ')}]` : '';
            
            // 构造符合要求的 Frontmatter
            const frontmatter = `---
title: "${title}"
published: ${published}
updated: ${today}
category: "${$("fm-category").value || 'Uncategorized'}"
image: "${$("fm-image").value || ''}"${tagStr}
---`;
            
            const fullContent = `${frontmatter}\n\n${vditor.getValue()}`;

            try {
                const apiUrl = `https://api.github.com/repos/${cfg.user}/${cfg.repo}/contents/${cfg.path}/${slug}.md`;
                let sha = "";
                const check = await fetch(apiUrl, { headers: { Authorization: `token ${cfg.token}` } });
                if(check.ok) sha = (await check.json()).sha;

                const res = await fetch(apiUrl, {
                    method: "PUT",
                    headers: { Authorization: `token ${cfg.token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        message: `🚀 Update: ${title}`, 
                        content: toBase64(fullContent), 
                        sha: sha || undefined 
                    })
                });
                if(res.ok) showToast("已同步至 GitHub！", "success");
                else throw new Error("同步失败");
            } catch (e) { showToast(e.message, "error"); }
            finally { btn.disabled = false; btn.innerHTML = "🚀 发布/更新"; }
        }

        function renderTags() {
            $("tags-container").innerHTML = tags.map((t, i) => `<span class="tag-pill">${t}<button onclick="removeTag(${i})" class="ml-1 opacity-60">×</button></span>`).join('');
        }
        window.removeTag = (i) => { tags.splice(i, 1); renderTags(); };
        $("fm-tags").onkeydown = (e) => {
            if(e.key === 'Enter') {
                const val = e.target.value.trim();
                if(val && !tags.includes(val)) { tags.push(val); renderTags(); }
                e.target.value = "";
            }
        };

        function toggleDarkMode() {
            const isDark = document.body.classList.toggle("dark");
            $("dark-btn").textContent = isDark ? "☀️" : "🌙";
            localStorage.setItem("pub_dark", isDark ? "1" : "0");
        }

        function unlock() {
            const pwd = $("access-password").value;
            if(pwd === ACTUAL_PASSWORD || ACTUAL_PASSWORD === "[[AUTH_PASSWORD]]" && pwd === "1234") {
                localStorage.setItem("pub_auth", "1");
                $("lock-screen").classList.add("hidden-lock");
                $("main-content").classList.remove("hidden");
                init();
            } else { alert("密钥验证失败"); }
        }

        function init() {
            CONFIG_KEYS.forEach(k => $(k).value = localStorage.getItem('cfg_'+k) || "");
            CONFIG_KEYS.forEach(k => $(k).onchange = (e) => localStorage.setItem('cfg_'+k, e.target.value));
            
            // 默认日期
            if(!$("fm-published").value) $("fm-published").value = new Date().toISOString().split('T')[0];
            
            vditor = new Vditor("vditor", {
                height: 700, mode: "ir", theme: "classic",
                placeholder: "开始书写你的 Astro 故事...",
                input: (v) => { $("char-count").textContent = v.length; saveDraft(v); },
                after: () => { const d = localStorage.getItem("pub_draft"); if(d) vditor.setValue(d); }
            });
            if(localStorage.getItem("pub_dark") === "1") toggleDarkMode();
        }

        function saveDraft(v) {
            localStorage.setItem("pub_draft", v);
            $("draft-indicator").classList.remove("hidden");
            setTimeout(() => $("draft-indicator").classList.add("hidden"), 2000);
        }

        window.logout = () => { localStorage.removeItem("pub_auth"); location.reload(); };
        window.openListModal = openListModal;
        window.closeListModal = () => $("list-modal").classList.add("hidden");
        window.publishToGithub = publishToGithub;
        window.testConnection = testConnection;
        window.toggleDarkMode = toggleDarkMode;
        $("unlock-btn").onclick = unlock;
        $("access-password").onkeydown = (e) => e.key === 'Enter' && unlock();

        if(localStorage.getItem("pub_auth") === "1") {
            $("lock-screen").classList.add("hidden-lock");
            $("main-content").classList.remove("hidden");
            init();
        }
    })();
    </script>
</body>
</html>
